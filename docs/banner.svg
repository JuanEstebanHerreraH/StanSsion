<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StanSsion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="0.55" stop-color="#141225"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="title" x1="320" y1="120" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37D8FE"/>
      <stop offset="0.5" stop-color="#4f8ef7"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="blob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8ef7"/>
      <stop offset="1" stop-color="#7c5cbf"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>

  <!-- ambient glow blobs -->
  <circle cx="130" cy="80" r="120" fill="#37D8FE" opacity="0.16" filter="url(#soft)"/>
  <circle cx="1080" cy="250" r="150" fill="#7c5cbf" opacity="0.18" filter="url(#soft)"/>
  <circle cx="980" cy="60" r="90" fill="#4f8ef7" opacity="0.14" filter="url(#soft)"/>

  <!-- equalizer bars -->
  <g transform="translate(92,196)">
    <rect x="0"   y="-26" width="9" height="26" rx="4" fill="url(#blob)" opacity="0.9"/>
    <rect x="16"  y="-54" width="9" height="54" rx="4" fill="url(#blob)" opacity="0.9"/>
    <rect x="32"  y="-40" width="9" height="40" rx="4" fill="url(#blob)" opacity="0.9"/>
    <rect x="48"  y="-72" width="9" height="72" rx="4" fill="url(#blob)" opacity="0.9"/>
    <rect x="64"  y="-34" width="9" height="34" rx="4" fill="url(#blob)" opacity="0.9"/>
    <rect x="80"  y="-58" width="9" height="58" rx="4" fill="url(#blob)" opacity="0.9"/>
  </g>

  <text x="208" y="172" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="url(#title)" letter-spacing="-2">StanSsion</text>
  <text x="212" y="214" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#a9b0c7">Espacio de audio ambiente para estudiar y concentrarte</text>

  <!-- chips -->
  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600">
    <rect x="212" y="240" width="120" height="32" rx="16" fill="#4f8ef7" opacity="0.14"/>
    <text x="272" y="261" fill="#7fb0ff" text-anchor="middle">Ambiente</text>
    <rect x="344" y="240" width="120" height="32" rx="16" fill="#7c5cbf" opacity="0.16"/>
    <text x="404" y="261" fill="#c0a8f5" text-anchor="middle">Emisoras</text>
    <rect x="476" y="240" width="140" height="32" rx="16" fill="#37D8FE" opacity="0.14"/>
    <text x="546" y="261" fill="#6fd9f5" text-anchor="middle">Temporizador</text>
    <rect x="628" y="240" width="150" height="32" rx="16" fill="#3ecf8e" opacity="0.14"/>
    <text x="703" y="261" fill="#6fe0ad" text-anchor="middle">Área de trabajo</text>
  </g>
</svg>
